<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>安卓电视播放器控制台</title>
        <link rel="icon" type="image/x-icon"
              href="data:image/x-icon;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQEAYAAABPYyMiAAAABmJLR0T///////8JWPfcAAAACXBIWXMAAABIAAAASABGyWs+AAAAF0lEQVRIx2NgGAWjYBSMglEwCkbBSAcACBAAAeaR9cIAAAAASUVORK5CYII="/>
        <style>
            * {
                box-sizing: border-box;
            }

            html, body {
                margin: 0;
                padding: 0;
                display: block;
                height: 100%;
                width: 100%;
                font-size: 62%;
            }

            body {
                background-color: white /*不考虑深色主题*/;
                color: black;
                font-size: 1rem;
                text-align: center;
            }

            form {
                display: block;
                width: 100%;
                height: 100%;
            }

            button.btn {
                display: block;
                width: 100%;
                height: 5%;
            }

            #url {
                display: block;
                width: 100%;
                border: 0 none;
                padding: 5px;
                text-align: center;
                height: 95%;
                overflow: auto;
                word-wrap: break-word;
                resize: none;
            }
        </style>
    </head>
    <body>
        <form method="GET" action="?">
            <script>
                document.write('<input type="hidden" value="' + +new Date + '" name="noCache" />');
            </script>
            <label for="url"></label>
            <textarea
                    id="url"
                    name="url"
                    placeholder="请输入视频的url"
                    onfocus="this.select();"
            ></textarea>
            <button class="btn">发送</button>
        </form>
    </body>
</html>
