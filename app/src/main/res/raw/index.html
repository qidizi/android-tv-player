<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>安卓电视播放器控制台</title>
        <link rel="icon" type="image/x-icon"
              href="data:image/x-icon;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQEAYAAABPYyMiAAAABmJLR0T///////8JWPfcAAAACXBIWXMAAABIAAAASABGyWs+AAAAF0lEQVRIx2NgGAWjYBSMglEwCkbBSAcACBAAAeaR9cIAAAAASUVORK5CYII="/>
        <style>
            * {
                box-sizing: border-box;
            }

            html, body {
                margin: 0;
                padding: 0;
                display: block;
                height: 100%;
                width: 100%;
                font-size: 62%;
            }

            body {
                background-color: white /*不考虑深色主题*/;
                color: black;
                font-size: 1rem;
                text-align: center;
            }

            form {
                display: block;
                width: 100%;
                height: 100%;
            }

            button.btn {
                display: block;
                width: 100%;
                height: 30%;
            }

            #url {
                display: block;
                width: 100%;
                border: 0 none;
                padding: 5px;
                text-align: left;
                height: 70%;
                overflow: auto;
                word-wrap: break-word;
                resize: none;
            }
        </style>
    </head>
    <body>
        <form method="GET" action="?">
            <script>
                document.write('<input type="hidden" value="' + +new Date + '" name="noCache" />');
            </script>
            <label for="url"></label>
            <textarea
			        onchange="this.value = this.value.trim();"
                    id="url"
                    name="url"
                    placeholder="
请输入要在tv播放的视频url
建议在电视端安装兼容性比较好的mx player
发送的url会尝试复制至电视端的剪切板中，便于通过手动打开其它播放器粘贴方式进行播放
需要给app授予联网权限
"
                    onfocus="this.select();"
            ></textarea>
            <button class="btn" type="submit" onclick="
return /^https?:\/+.+$/gi.test(document.getElementById('url').value) ? true : (alert('视频url无效'), false);
">发送至电视（请留意电视上提示）
            </button>
        </form>
        <script>
            +function () {
                let result = String("&" + location.search.replace('?', '&') + '&').match(/&url=([^&]+)/i);

                if (result) {
                    document.getElementById('url').value = decodeURIComponent(result[1]);
                }
            }();
        </script>
    </body>
</html>
